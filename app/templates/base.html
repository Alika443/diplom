<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}PMS Система{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #2c3e50; --sidebar-hover: #34495e; }
        body { background-color: #f4f7f6; }
        .sidebar { 
            min-height: 100vh; 
            background: var(--sidebar-bg); 
            color: white; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .nav-link { color: #ecf0f1 !important; padding: 15px 20px; border-bottom: 1px solid #3e4f5f; }
        .nav-link:hover { background: var(--sidebar-hover); }
        .main-content { padding: 30px; }
        .card-stat { border: none; border-radius: 10px; transition: 0.3s; }
        .card-stat:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar p-0">
                <div class="p-4 text-center">
                    <h4>DevProject <strong>App</strong></h4>
                </div>
                <div class="nav flex-column">
                    <a class="nav-link" href="/">📊 Панель управления</a>
                    <a class="nav-link" href="/projects">📂 Мои Проекты</a>
                    <a class="nav-link" href="/tasks">✅ Задачи команды</a>
                    <a class="nav-link" href="/users">👥 Пользователи</a>
                    <div class="mt-5 p-3">
                        <small class="text-muted">Вы вошли как: <strong>Admin</strong></small>
                    </div>
                </div>
            </nav>

            <main class="col-md-10 main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
