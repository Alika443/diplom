{% extends "base.html" %}

{% block title %}Главная - PMS{% endblock %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-12">
        <div class="p-5 mb-4 bg-white border rounded-3">
            <h2>Добро пожаловать в систему управления проектами!</h2>
            <p>Выберите раздел в меню слева, чтобы начать работу.</p>
        </div>
    </div>
</div>

<div class="row text-center">
    <div class="col-md-4">
        <div class="card shadow-sm p-3">
            <h3>📂 Проекты</h3>

        <div class="card shadow-sm p-3">
            <h3>📝 Задачи</h3>
            <p>Ваши текущие задания</p>

        <div class="card shadow-sm p-3">
            <h3>📊 Отчеты</h3>
            <p>Для заказчика</p>

    </div>
