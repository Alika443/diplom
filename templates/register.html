<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация в ProjectHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
        }
        .register-card {
            max-width: 400px;
            width: 100%;
            border: none;
            border-radius: 15px;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="card register-card shadow-sm p-4 bg-white">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">PROJECT<span class="text-dark">HUB</span></h2>
        <p class="text-muted small">Регистрация нового участника</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small text-center" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <form action="/register" method="post">
        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Имя пользователя</label>
            <input type="text" name="username" class="form-control form-control-lg shadow-none" style="font-size: 0.95rem; border-radius: 8px;" required placeholder="Иван Иванов">
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Email адрес</label>
            <input type="email" name="email" class="form-control form-control-lg shadow-none" style="font-size: 0.95rem; border-radius: 8px;" required placeholder="ivan@example.com">
        </div>
        
        <div class="mb-4">
            <label class="form-label small fw-bold text-muted">Пароль</label>
            <input type="password" name="password" class="form-control form-control-lg shadow-none" style="font-size: 0.95rem; border-radius: 8px;" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" style="font-size: 1rem; border-radius: 8px; background-color: #4e73df; border: none;">
            Зарегистрироваться
        </button>
    </form>

    <div class="text-center mt-2">
        <span class="text-muted small">Уже есть аккаунт?</span>
        <a href="/login" class="small text-decoration-none fw-bold ms-1" style="color: #4e73df;">Войти</a>
    </div>
</div>

</body>
</html>
