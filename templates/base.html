<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ProjectHub{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { 
            background-color: #f8f9fa; 
            overflow-x: hidden; 
            margin: 0; 
        }
        
        /* Стили боковой панели */
        .sidebar { 
            min-height: 100vh; 
            background: #b7b9bc; 
            position: fixed; 
            top: 0;
            left: 0;
            width: 250px; 
            z-index: 1000;
            transition: transform 0.3s ease; 
            display: flex;
            flex-direction: column;
        }
        
        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .sidebar h4 {
            padding: 20px 0;
            margin: 0;
            color: #151516;
        }

        .sidebar a { 
            color: #151516; 
            text-decoration: none; 
            display: block; 
            padding: 12px 20px; 
            font-weight: 500;
            white-space: nowrap; 
            overflow: hidden;
        }
        
        .sidebar a:hover { 
            background: rgba(255,255,255,0.2); 
            color: #000; 
        }

        .resizer {
            width: 8px;
            cursor: col-resize;
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 1001;
            transition: background 0.2s;
        }
        
        .resizer:hover {
            background: rgba(0, 0, 0, 0.1);
        }
        
        /* Контентная область */
        .content { 
            transition: margin-left 0.3s ease, width 0.3s ease;
            margin-left: 250px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .content.expanded {
            margin-left: 0 !important;
        }

        /* Верхняя панель (Header) */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
        }

        #toggleSidebar {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #151516;
        }

        /* Профиль */
        .profile-avatar {
    /* Фиксируем размер, чтобы Flexbox не мог его сжать */
    width: 40px !important;
    height: 40px !important;
    min-width: 40px !important; 
    min-height: 40px !important;

    /* Сохраняем пропорции 1 к 1 */
    aspect-ratio: 1 / 1 !important;
    
    border-radius: 50% !important;
    object-fit: cover !important;
    border: 1px solid #151516;
    
    /* Убираем возможные отступы от Bootstrap */
    padding: 0 !important;
    margin: 0 !important;
    display: block !important;
}


        .profile-avatar:hover {
            opacity: 0.8;
        }

        .profile-dropdown::after {
            display: none !important;
        }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <h4 class="text-center">ProjectHub</h4>
        <a href="/">Главная</a>
        <a href="/projects">Проекты</a>
        <a href="/tasks">Задачи</a>
        <a href="/users">Участники</a>
        <hr>
        <a href="/logout">Выход</a>
        <div class="resizer" id="resizer"></div>
    </nav>

    <main class="content" id="content">
        <header class="header-container">
            <button id="toggleSidebar" title="Скрыть/Показать меню">☰</button>
            
            <div class="dropdown">
                <a href="#" class="profile-dropdown dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                    <img src="https://thumbs.dreamstime.com/b/%D0%BF%D1%80%D0%BE%D1%84%D0%B8%D0%BB%D1%8C-%D0%BF%D0%BE%D0%BB%D1%8C%D0%B7%D0%BE%D0%B2%D0%B0%D1%82%D0%B5%D0%BB%D1%8F-%D0%B2%D0%B5%D0%BA%D1%82%D0%BE%D1%80%D0%B0-%D0%BF%D1%80%D0%BE%D1%84%D0%B8%D0%BB%D1%8F-%D0%B0%D0%B2%D0%B0%D1%82%D0%B0%D1%80%D1%8B-%D0%BF%D0%BE-%D1%83%D0%BC%D0%BE%D0%BB%D1%87%D0%B0%D0%BD%D0%B8%D1%8E-179376714.jpg" alt="Профиль" class="profile-avatar">
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" style="min-width: 320px; padding: 12px 0;">
    <li class="px-4 pt-2">
        <span class="text-uppercase fw-semibold" style="font-size: 0.75rem; color: #6c757d; letter-spacing: 1px;">
            Учетная запись
        </span>
    </li>

    <li class="px-4 py-3 d-flex align-items-center">
        <img src="https://thumbs.dreamstime.com/b/%D0%BF%D1%80%D0%BE%D1%84%D0%B8%D0%BB%D1%8C-%D0%BF%D0%BE%D0%BB%D1%8C%D0%B7%D0%BE%D0%B2%D0%B0%D1%82%D0%B5%D0%BB%D1%8F-%D0%B2%D0%B5%D0%BA%D1%82%D0%BE%D1%80%D0%B0-%D0%BF%D1%80%D0%BE%D1%84%D0%B8%D0%BB%D1%8F-%D0%B0%D0%B2%D0%B0%D1%82%D0%B0%D1%80%D1%8B-%D0%BF%D0%BE-%D1%83%D0%BC%D0%BE%D0%BB%D1%87%D0%B0%D0%BD%D0%B8%D1%8E-179376714.jpg" 
             alt="Профиль" 
             class="profile-avatar me-5">
        
        <div class="d-flex flex-column ps-2" style="line-height: 1.6;">
            <span class="fw-bold" style="font-size: 1.25rem; color: #151516; letter-spacing: 0.4px;">
                Имя Пользователя
            </span>
            <span class="text-muted" style="font-size: 0.95rem;">
                user@example.com
            </span>
        </div>
    </li>
    
    <li><hr class="dropdown-divider"></li>
    
    <li><a class="dropdown-item py-2 px-4" href="/profile">Настройки</a></li>
    <li><a class="dropdown-item py-2 px-4" href="/help">Помощь</a></li>
    
    <li><hr class="dropdown-divider"></li>
    
    <li><a class="dropdown-item py-2 px-4 text-danger" href="/logout">Выйти</a></li>
</ul>
            </div>
        </header>
        
        <div class="container-fluid py-4">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');
        const resizer = document.getElementById('resizer');
        const toggleBtn = document.getElementById('toggleSidebar');

        // Скрытие панели
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            content.classList.toggle('expanded');
        });

        // Изменение ширины
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            let newWidth = e.clientX;
            if (newWidth > 150 && newWidth < 600) {
                sidebar.style.width = newWidth + 'px';
                if (!sidebar.classList.contains('collapsed')) {
                    content.style.marginLeft = newWidth + 'px';
                }
            }
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
            document.body.style.userSelect = 'auto';
        });
    </script>
</body>
</html>
