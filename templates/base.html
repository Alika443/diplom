<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Управление проектами{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: #b7b9bc; color: white; padding-top: 20px; }
        .sidebar a { color: #151516; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover { background: #b7b9bc; color: white; }
        .content { padding: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar">
                <h4 class="text-center">Система?</h4>
                <a href="/">Главная</a>
                <a href="/projects">Проекты</a>
                <a href="/tasks">Задачи</a>
                <a href="/users">Участники</a>
                <hr>
                <a href="/logout">Выход</a>
            </nav>
            <main class="col-md-10 content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
