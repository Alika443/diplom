<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ProjectHub{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-width: 240px;
            --topbar-height: 70px;
            --neutral-dark: #151516; 
            --neutral-gray: #6c757d;
        }

        body {
            background-color: #f4f7f6;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Боковое меню */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #ffffff;
            border-right: 1px solid #e0e0e0;
            padding-top: 20px;
            z-index: 1050;
            transition: transform 0.3s ease;
        }

        .sidebar.hidden { transform: translateX(-100%); }

        .sidebar-brand {
            padding: 0 25px 30px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neutral-dark);
        }

        .nav-link {
            padding: 12px 25px;
            color: var(--neutral-gray);
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--neutral-dark);
            background: #f8f9fa;
        }

        /* Верхняя панель */
        .topbar {
            height: var(--topbar-height);
            margin-left: var(--sidebar-width);
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: margin-left 0.3s ease;
        }

        .topbar.full-width, .main-content.full-width { margin-left: 0; }

        /* Поиск */
        .search-container {
            flex-grow: 1;
            max-width: 600px;
            margin-left: 20px;
            position: relative;
        }
        
        .search-input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input-group i {
            position: absolute;
            left: 15px;
            color: #adb5bd;
        }

        .custom-search-input {
            width: 100%;
            padding: 8px 10px 8px 40px;
            background: #f1f3f4;
            border: none;
            border-radius: 20px;
            font-size: 0.9rem;
            outline: none;
        }

        .search-categories {
            display: none; 
            gap: 15px;
            margin-top: 8px;
            position: absolute;
            top: 100%;
            left: 0;
            background: #ffffff;
            width: 100%;
            padding: 10px;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .search-container.active .search-categories { display: flex; }

        .category-link {
            color: var(--neutral-gray);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            padding-bottom: 3px;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            text-transform: uppercase;
        }

        .category-link.active {
            color: var(--neutral-dark);
            border-bottom: 2px solid var(--neutral-gray);
        }

        /* Профиль и выпадающее меню */
        .profile-dropdown .dropdown-toggle::after { display: none; }
        
        .profile-avatar {
            width: 40px;
            height: 40px;
            background-color: #5145cd; /* Фиолетовый как на скрине */
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .profile-header {
            padding: 10px 15px;
            min-width: 250px;
        }

        .profile-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--neutral-gray);
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: block;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
            min-height: calc(100vh - var(--topbar-height));
            transition: margin-left 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand text-uppercase">ProjectHub</div>
        <nav class="nav flex-column">
            <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
                <i class="fas fa-home me-2"></i> Главная
            </a>
            <a class="nav-link {% if request.url.path == '/projects' %}active{% endif %}" href="/projects">
                <i class="fas fa-project-diagram me-2"></i> Проекты
            </a>
            <a class="nav-link {% if request.url.path.startswith('/tasks') %}active{% endif %}" href="/tasks">
                <i class="fas fa-check-square me-2"></i> Задачи
            </a>
            <a class="nav-link {% if request.url.path == '/users' %}active{% endif %}" href="/users">
                <i class="fas fa-users me-2"></i> Участники
            </a>
            <hr>
            <a class="nav-link text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i> Выход</a>
        </nav>
    </div>

    <div class="topbar" id="topbar">
        <button class="btn me-3" id="toggleBtn">
            <i class="fas fa-bars"></i>
        </button>
        
        <div class="search-container" id="searchContainer">
            <form action="/search" method="get" id="searchForm">
                <div class="search-input-group">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" name="q" class="custom-search-input" placeholder="Поиск проектов, задач или участников..." autocomplete="off">
                </div>
                
                <div class="search-categories">
                    <span class="category-link active">Все</span>
                    <span class="category-link">Проекты</span>
                    <span class="category-link">Задачи</span>
                    <span class="category-link">Команда</span>
                </div>
            </form>
        </div>

        <div class="ms-auto dropdown profile-dropdown">
            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" id="profileMenu" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="profile-avatar">A</div>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 p-2" aria-labelledby="profileMenu">
                <li class="profile-header">
                    <span class="profile-title">Учетная запись</span>
                    <div class="d-flex align-items-center mt-2">
                        <div class="profile-avatar me-3" style="width: 45px; height: 45px;">A</div>
                        <div>
                            <div class="fw-bold" style="color: var(--neutral-dark); line-height: 1.2;">ALVAL</div>
                            <small class="text-muted">alikarazakova7@gmail.com</small>
                        </div>
                    </div>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item py-2" href="#"><i class="fas fa-cog me-2"></i> Настройки</a></li>
                <li><a class="dropdown-item py-2" href="#"><i class="fas fa-question-circle me-2"></i> Помощь</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item py-2 text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i> Выход</a></li>
            </ul>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const sidebar = document.getElementById('sidebar');
        const topbar = document.getElementById('topbar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('toggleBtn');
        const searchInput = document.getElementById('searchInput');
        const searchContainer = document.getElementById('searchContainer');

        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('hidden');
            topbar.classList.toggle('full-width');
            mainContent.classList.toggle('full-width');
        });

        searchInput.addEventListener('focus', () => {
            searchContainer.classList.add('active');
        });

        document.addEventListener('click', (e) => {
            if (!searchContainer.contains(e.target)) {
                searchContainer.classList.remove('active');
            }
        });
    </script>
</body>
</html>
