{% extends "base.html" %}

{% block title %}Участники - ProjectHub{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" style="color: var(--neutral-dark);">Команда</h2>
        <button class="btn border shadow-sm px-4" style="background: #ffffff; color: var(--neutral-dark); border-radius: 8px;">
            <i class="fas fa-user-plus me-2"></i> Пригласить
        </button>
    </div>

    <div class="row g-4">
        {% for user in users %}
        <div class="col-md-4 col-lg-3">
            <div class="card border-0 shadow-sm text-center p-4" style="border-radius: 16px;">
                <div class="profile-avatar mx-auto mb-3" style="width: 64px; height: 64px; font-size: 1.5rem; background-color: #5145cd;">
                    {{ user.username[0] | upper }}
                </div>
                <h5 class="fw-bold mb-1">{{ user.username }}</h5>
                <p class="text-muted small mb-3">{{ user.email }}</p>
                
                <div class="d-flex justify-content-around border-top pt-3 mt-2">
                    <div>
                        <div class="fw-bold small">12</div>
                        <div class="text-muted" style="font-size: 0.7rem;">Задач</div>
                    </div>
                    <div>
                        <div class="fw-bold small">3</div>
                        <div class="text-muted" style="font-size: 0.7rem;">Проекта</div>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12 text-center py-5 text-muted">Пользователи не найдены.</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
